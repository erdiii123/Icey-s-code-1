<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Untuk ICEYYY 🌊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #b8dff5 0%, #7ec8e3 30%, #3a9bc4 60%, #1a6fa8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    position: relative;
  }

  /* WAVE LAYERS */
  .waves {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    z-index: 0;
    pointer-events: none;
  }
  .wave {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 100%;
  }
  .wave svg { width: 100%; height: 100%; }
  .wave1 { animation: waveMove 7s linear infinite; opacity: 0.5; }
  .wave2 { animation: waveMove 10s linear infinite reverse; opacity: 0.35; bottom: 10px; }
  .wave3 { animation: waveMove 13s linear infinite; opacity: 0.25; bottom: 20px; }
  @keyframes waveMove {
    0%   { transform: translateX(0); }
    100% { transform: translateX(33.33%); }
  }

  /* FLOATING HEARTS */
  .floating { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .fh {
    position: absolute;
    opacity: 0;
    animation: floatHeart linear infinite;
  }
  @keyframes floatHeart {
    0%   { opacity: 0; transform: translateY(0) scale(0.7) rotate(-10deg); }
    10%  { opacity: 1; }
    80%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-110vh) scale(1.2) rotate(10deg); }
  }

  /* CARD */
  .card {
    position: relative; z-index: 2;
    max-width: 440px; width: 100%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1.5px solid rgba(255,255,255,0.45);
    border-radius: 28px;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    box-shadow: 0 8px 48px rgba(10, 60, 120, 0.25), inset 0 0 0 1px rgba(255,255,255,0.15);
  }

  .deco { font-size: 20px; opacity: 0.7; margin-bottom: 0.9rem; letter-spacing: 8px; color: #fff; }

  .greeting {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ceeeff;
    margin-bottom: 0.5rem;
    font-family: sans-serif;
    font-weight: 500;
  }

  .name {
    font-size: 32px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 1.75rem;
    text-shadow: 0 2px 12px rgba(10,60,120,0.3);
  }

  .photo-wrap {
    width: 155px; height: 155px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid rgba(255,255,255,0.75);
    box-shadow: 0 6px 28px rgba(10,60,120,0.3), 0 0 0 8px rgba(255,255,255,0.12);
    margin: 0 auto 1.75rem;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .divider {
    width: 70px; height: 1.5px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
    margin: 0 auto 1.5rem;
  }

  .message {
    font-size: 15px;
    line-height: 2;
    color: #e8f6ff;
    font-style: italic;
    margin-bottom: 1.75rem;
    text-shadow: 0 1px 4px rgba(10,60,120,0.2);
  }

  .deco2 { font-size: 16px; opacity: 0.6; margin-bottom: 1rem; letter-spacing: 6px; color: #ceeeff; }

  .sig {
    font-size: 14px;
    color: #ceeeff;
    font-family: sans-serif;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
</style>
</head>
